<!DOCTYPE html>
<html>
<head>
    <title>Add Staff - ISSNE</title>
    <link rel="stylesheet" href="../CSS/dashboard.css">
</head>
<body>
    <nav class="comet-navbar">
        <div class="nav-brand">
            <h2>🚀 ISSNE</h2>
        </div>
        <ul class="nav-links">
            <li><a href="../HTML/dashboard.html">📊 Dashboard</a></li>
            <li><a href="../HTML/addstaff.html" class="active">➕ Add Staff</a></li>
            <li><a href="../HTML/attendance.html">📋 Attendance</a></li>
            <li><a href="../HTML/salary.html">💰 Salary</a></li>
            <li><a href="../HTML/staff.html">👥 Staff</a></li>
            <li><a href="../HTML/projects.html">📋 Projects</a></li>
            <li><a href="../HTML/machinedetails.html">⚙️ Machines</a></li>
            <li><a href="../HTML/settings.html">⚙️ Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="control-panel">
            <h1>➕ Add New Staff</h1>
            <p>Industrial Staff Sync Network Environment</p>
        </div>

        <div class="quick-actions">
            <h2>👤 Staff Details</h2>
            <form id="staffForm" style="margin-top: 20px;">
                <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">👤 Full Name *</label>
                        <input type="text" id="name" required style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">📱 Contact Number *</label>
                        <input type="tel" id="contact" required style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">♂️ Gender</label>
                        <select id="gender" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                            <option value="">Select</option>
                            <option value="Male" style="color:black;background:white;"">Male</option>
                            <option value="Female" style="color:black;background:white;"">Female</option>
                            <option value="Other" style="color:black;background:white;"">Other</option>
                        </select>
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🩸 Blood Group</label>
                        <select id="blood" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                            <option value="">Select</option>
                            <option style="color:black;background:white;"">A+</option><option style="color:black;background:white;"">A-</option>
                            <option style="color:black;background:white;"">B+</option><option style="color:black;background:white;"">B-</option>
                            <option style="color:black;background:white;"">O+</option><option style="color:black;background:white;"">O-</option>
                            <option style="color:black;background:white;"">AB+</option><option style="color:black;background:white;"">AB-</option>
                        </select>
                    </div>
                    
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🎂 Date of Birth</label>
                        <input type="date" id="dob" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🎂 Age (Auto)</label>
                        <input type="text" id="age" readonly style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">📅 Date of Joining</label>
                        <input type="date" id="doj" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">💼 Experience (Auto)</label>
                        <input type="text" id="experience" readonly style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🏗️ Project</label>
                        <input type="text" id="project" placeholder="ISSNE" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🕒 Shift</label>
                        <select id="shift" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                            <option value="" style="color:black;background:white;"">Select</option>
                            <option style="color:black;background:white;"">Day</option>
                            <option style="color:black;background:rgb(255, 255, 255);"">Night</option>
                            <option style="color:black;background:white;"">General</option>
                        </select>
                    </div>
             
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">💰 Monthly Salary (₹)</label>
                        <input type="number" id="salary" min="0" placeholder="50000" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">❤️ Health Status</label>
                        <input type="text" id="health" placeholder="Good" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">🏥 Medical History</label>
                        <input type="text" id="medical" placeholder="None" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                    <div class="stat-card" style="text-align: left;">
                        <label style="color: rgba(255,255,255,0.8); font-size: 0.9em;">⚠️ Allergies</label>
                        <input type="text" id="allergies" placeholder="None" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; margin-top: 5px;">
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: center; display: flex; gap: 15px; justify-content: center;">
                    <button type="submit" class="glow-btn">✅ Add Staff</button>
                    <button type="button" onclick="location.href='staff.html'" class="glow-btn" style="background: rgba(255,255,255,0.2);">👈 Back</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../JS/datasync.js"></script>
    <script src="../JS/addstaff.js"></script>
</body>
</html>
