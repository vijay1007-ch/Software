<!-- login.html (minimal change - just add hint) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISSNE - Login</title>̥
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="stylesheet" href="/CSS/signup.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">̥
            <h1>ISSNE</h1>
            <p class="tagline">Industrial Staff Sync Network Environment</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">👤 Username / Staff ID</label>
                    <input type="text" id="username" name="username" placeholder="admin or STF001" required>
                </div>
                
                <div class="form-group">
                    <label for="password">🔑 Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <p class="signup-link">
                Don't have an account? <a href="/HTML/signup.html">Sign Up</a>̥
            </p>
        </div>
    </div>

    <script src="/JS/login.js"></script>
</body>
</html>
